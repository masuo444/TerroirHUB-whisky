<script>
const B=[{"id": "yoichi", "name": "余市蒸溜所", "brand": "余市", "type": "シングルモルト", "area": "余市町", "founded": "1934", "founded_era": "昭和9年", "desc": "1934年、竹鶴政孝がスコットランドに似た気候を求めて開設したニッカウヰスキーの原点。石炭直火蒸留を今も守り続ける。", "whisky_type": "single_malt", "cask_type": "", "age_statement": ""}, {"id": "akkeshi", "name": "厚岸蒸溜所", "brand": "厚岸", "type": "シングルモルト", "area": "厚岸町", "founded": "2016", "founded_era": "平成28年", "desc": "2016年に堅展実業が北海道厚岸町に開設。スコットランド・アイラ島に似た冷涼で湿潤な気候を活かしたウイスキー造り。二十四節気シリーズで高い評価を得る。", "whisky_type": "single_malt", "cask_type": "", "age_statement": ""}, {"id": "niseko", "name": "ニセコ蒸溜所", "brand": "ニセコ", "type": "シングルモルト", "area": "ニセコ町", "founded": "2021", "founded_era": "令和3年", "desc": "八海醸造グループが2021年にニセコ町に開設。ニセコアンヌプリの良質な伏流水を使用し、冷涼な気候のもとでウイスキー造りを行う。", "whisky_type": "single_malt", "cask_type": "", "age_statement": ""}, {"id": "rishiri", "name": "利尻蒸留所", "brand": "利尻", "type": "シングルモルト", "area": "利尻町", "founded": "2022", "founded_era": "令和4年", "desc": "2022年に利尻島に開設された日本最北のウイスキー蒸留所。", "whisky_type": "single_malt", "cask_type": "", "age_statement": ""}, {"id": "maoi", "name": "馬追蒸溜所", "brand": "馬追", "type": "シングルモルト", "area": "長沼町", "founded": "2022", "founded_era": "令和4年", "desc": "2022年に北海道長沼町に開設。旧北海道マオイ自由の丘ワイナリーを前身とし、ワイン・ブランデー・ウイスキーを製造。", "whisky_type": "single_malt", "cask_type": "", "age_statement": ""}, {"id": "sawamachi", "name": "サワマチ蒸溜所", "brand": "サワマチ", "type": "シングルモルト", "area": "", "founded": "", "founded_era": "", "desc": "エムエスティー合同会社が運営する北海道のウイスキー蒸留所。", "whisky_type": "single_malt", "cask_type": "", "age_statement": ""}, {"id": "di_tripper", "name": "ディ・トリッパー蒸留所", "brand": "ディ・トリッパー", "type": "シングルモルト", "area": "函館市", "founded": "2023", "founded_era": "令和5年", "desc": "2023年に函館市元町に開設。輸入ウイスキーを手がけるBehind The Caskが函館の中心部に構えたクラフト蒸留所。", "whisky_type": "single_malt", "cask_type": "", "age_statement": ""}];
const WLABELS={'malt':'モルト','grain':'グレーン','blended':'ブレンデッド','blended_malt':'BM','single_cask':'シングルカスク'};
const areas=[...new Set(B.map(b=>b.area).filter(Boolean))].sort();
const types=[...new Set(B.map(b=>b.whisky_type).filter(Boolean))];
let curArea='',curType='';
function renderFilters(){
  const f=document.getElementById('filters');
  let h='<button class="filter-btn active" onclick="curArea=\'\';curType=\'\';renderFilters();render()">すべて</button>';
  if(types.length>1)types.forEach(t=>{h+='<button class="filter-btn'+(curType===t?' active':'')+'" onclick="curType=curType===\''+t+'\'?\'\':'+JSON.stringify(t)+';curArea=\'\';renderFilters();render()">'+((WLABELS[t]||t))+'</button>';});
  if(areas.length>1)areas.forEach(a=>{h+='<button class="filter-btn'+(curArea===a?' active':'')+'" onclick="curArea=curArea===\''+a.replace(/'/g,"\\'")+'\' ?\'\':'+JSON.stringify(a)+';curType=\'\';renderFilters();render()">'+a+'</button>';});
  f.innerHTML=h;
}
function render(){
  const g=document.getElementById('grid');
  const filtered=B.filter(b=>(!curArea||b.area===curArea)&&(!curType||b.whisky_type===curType));
  if(!filtered.length){g.innerHTML='<div class="empty">該当する蒸留所がありません</div>';return;}
  g.innerHTML=filtered.map(b=>{
    const tags=[];
    if(b.whisky_type&&WLABELS[b.whisky_type])tags.push(WLABELS[b.whisky_type]);
    if(b.cask_type)tags.push(b.cask_type.split('・')[0]);
    if(b.age_statement&&b.age_statement!=='NAS')tags.push(b.age_statement+'年');
    return '<a class="card" href="/whisky/hokkaido/'+b.id+'.html">'+
      '<div class="card-name">'+b.name+'</div>'+
      (b.brand?'<div class="card-brand">'+b.brand+'</div>':'')+
      '<div class="card-meta">'+(b.area||'')+(b.founded?' ・ 創業'+b.founded+'年':'')+'</div>'+
      (b.desc?'<div class="card-desc">'+b.desc+'</div>':'')+
      (tags.length?'<div class="card-tags">'+tags.map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>':'')+
    '</a>';
  }).join('');
}
renderFilters();render();
</script>
