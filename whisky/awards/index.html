/* Loading */

/* Pagination */

.page-btn:hover,.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.page-btn:disabled{opacity:0.4;cursor:default;background:#fff;color:#666;border-color:#e0ddd8;}

/* Footer */
.awards-footer{text-align:center;padding:32px 20px;border-top:1px solid #f0ede8;margin-top:20px;}
.awards-footer p{font-size:12px;color:#bbb;}
.awards-footer a{color:var(--accent);text-decoration:none;}
</style>

<script>
(function(){
  'use strict';

  const SB_URL = 'https://hhwavxavuqqfiehrogwv.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhod2F2eGF2dXFxZmllaHJvZ3d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Njk3MzAsImV4cCI6MjA4OTU0NTczMH0.tHMQ_u51jp69AMUKKtTvxL09Sr11JFPKGRhKMmUzEjg';
  const CATEGORY = 'whisky';
  const PER_PAGE = 50;

  let allAwards = [];
  let filtered = [];
  let currentPage = 1;
  let filters = { competition: '', level: '', year: '', search: '' };

  const LEVEL_LABELS = {
    gold: '金賞', silver: '銀賞', bronze: '銅賞',
    trophy: 'トロフィー', best_in_class: '最優秀賞', platinum: 'プラチナ賞'
  };
  const LEVEL_CSS = {
    gold: 'level-gold', silver: 'level-silver', bronze: 'level-bronze',
    trophy: 'level-trophy', best_in_class: 'level-best', platinum: 'level-platinum'
  };

  function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  async function fetchAwards(){
    try {
      const url = `${SB_URL}/rest/v1/awards?category=eq.${CATEGORY}&order=year.desc,award_level.asc&limit=5000`;
      const res = await fetch(url, {
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
      });
      if(!res.ok) throw new Error(res.status);
      allAwards = await res.json();
    } catch(e) {
      console.warn('[Awards] Fetch failed:', e);
      allAwards = [];
    }
    buildYearFilters();
    applyFilters();
    document.getElementById('loadingIndicator').style.display = 'none';
  }

  function buildYearFilters(){
    const years = [...new Set(allAwards.map(a => a.year))].sort((a,b) => b-a);
    const container = document.getElementById('yearFilters');
    let html = '<button class="filter-chip active" data-filter="year" data-value="">すべて</button>';
    years.forEach(y => {
      html += `<button class="filter-chip" data-filter="year" data-value="${y}">${y}</button>`;
    });
    container.innerHTML = html;
    bindFilterClicks(container);
  }

  function applyFilters(){
    filtered = allAwards.filter(a => {
      if(filters.competition && a.competition !== filters.competition) return false;
      if(filters.level && a.award_level !== filters.level) return false;
      if(filters.year && a.year !== parseInt(filters.year)) return false;
      if(filters.search){
        const q = filters.search.toLowerCase();
        if(!(a.producer_name||'').toLowerCase().includes(q) && !(a.product_name||'').toLowerCase().includes(q)) return false;
      }
      return true;
    });
    currentPage = 1;
    render();
  }

  function render(){
    const total = filtered.length;
    const start = (currentPage - 1) * PER_PAGE;
    const page = filtered.slice(start, start + PER_PAGE);

    document.getElementById('resultsCount').textContent = total > 0 ? `${total}件の受賞データ` : '';

    if(total === 0){
      document.getElementById('tableWrap').style.display = 'none';
      document.getElementById('awardsCards').innerHTML = '';
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('tableWrap').style.display = '';

    let tbody = '';
    page.forEach(a => {
      const levelClass = LEVEL_CSS[a.award_level] || '';
      const levelLabel = LEVEL_LABELS[a.award_level] || escHtml(a.award_level);
      const producerHtml = a.producer_id
        ? `<a class="producer-link" href="/whisky/${a.producer_id}.html">${escHtml(a.producer_name)}</a>`
        : escHtml(a.producer_name);
      const sourceHtml = a.source
        ? `<a href="${escHtml(a.source)}" target="_blank" rel="noopener" style="font-size:12px;color:var(--accent);">公式</a>`
        : '<span style="font-size:12px;color:#ddd;">—</span>';
      tbody += `<tr>
        <td>${a.year}</td>
        <td>${escHtml(a.competition)}</td>
        <td><span class="award-level ${levelClass}">${levelLabel}</span></td>
        <td style="font-family:'Shippori Mincho',serif;font-weight:600;">${escHtml(a.product_name)}</td>
        <td>${producerHtml}</td>
        <td>${sourceHtml}</td>
      </tr>`;
    });
    document.getElementById('awardsTableBody').innerHTML = tbody;

    let cards = '';
    page.forEach(a => {
      const levelClass = LEVEL_CSS[a.award_level] || '';
      const levelLabel = LEVEL_LABELS[a.award_level] || escHtml(a.award_level);
      const producerHtml = a.producer_id
        ? `<a class="producer-link" href="/whisky/${a.producer_id}.html">${escHtml(a.producer_name)}</a>`
        : escHtml(a.producer_name);
      cards += `<div class="award-card">
        <div class="award-card-header">
          <div class="award-card-product">${escHtml(a.product_name)}</div>
          <span class="award-level ${levelClass}">${levelLabel}</span>
        </div>
        <div class="award-card-producer">${producerHtml}</div>
        <div class="award-card-meta">
          <span class="award-card-tag">${a.year}</span>
          <span class="award-card-tag">${escHtml(a.competition)}</span>
          ${a.source ? `<a href="${escHtml(a.source)}" target="_blank" rel="noopener" class="award-card-tag" style="color:var(--accent);">出典</a>` : ''}
        </div>
      </div>`;
    });
    document.getElementById('awardsCards').innerHTML = cards;

    const totalPages = Math.ceil(total / PER_PAGE);
    let pag = '';
    if(totalPages > 1){
      pag += `<button class="page-btn" ${currentPage===1?'disabled':''} onclick="window._awardsPage(${currentPage-1})">&#8592;</button>`;
      for(let i=1;i<=totalPages;i++){
        if(totalPages>7 && i>2 && i<totalPages-1 && Math.abs(i-currentPage)>1){
          if(i===3||i===totalPages-2) pag += '<span style="padding:0 4px;color:#ccc;">...</span>';
          continue;
        }
        pag += `<button class="page-btn${i===currentPage?' active':''}" onclick="window._awardsPage(${i})">${i}</button>`;
      }
      pag += `<button class="page-btn" ${currentPage===totalPages?'disabled':''} onclick="window._awardsPage(${currentPage+1})">&#8594;</button>`;
    }
    document.getElementById('pagination').innerHTML = pag;
  }

  window._awardsPage = function(p){
    currentPage = p;
    render();
    window.scrollTo({top: document.querySelector('.results-section').offsetTop - 60, behavior:'smooth'});
  };

  function bindFilterClicks(container){
    container.querySelectorAll('.filter-chip[data-filter]').forEach(btn => {
      btn.addEventListener('click', function(){
        const group = this.dataset.filter;
        const val = this.dataset.value;
        const parent = this.closest('.filter-row') || this.parentElement;
        parent.querySelectorAll(`.filter-chip[data-filter="${group}"]`).forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        filters[group] = val;
        applyFilters();
      });
    });
  }

  document.querySelectorAll('.filter-row').forEach(row => bindFilterClicks(row));

  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', function(){
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      filters.search = this.value.trim();
      applyFilters();
    }, 300);
  });

  fetchAwards();
})();
